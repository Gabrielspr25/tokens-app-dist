<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos - Token Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-coins"></i>
                    <h2>Token Manager</h2>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <h3 id="userName">Admin User</h3>
                        <p id="userRole">Administrador</p>
                    </div>
                </div>
            </div>
            
            <div class="nav-menu">
                <div class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <i class="fas fa-chart-pie"></i>
                        Dashboard
                    </a>
                </div>
                <div class="nav-item">
                    <a href="modelos.html" class="nav-link active">
                        <i class="fas fa-users"></i>
                        Modelos
                    </a>
                </div>
                <div class="nav-item">
                    <a href="proveedores.html" class="nav-link">
                        <i class="fas fa-building"></i>
                        Proveedores
                    </a>
                </div>
                <div class="nav-item">
                    <a href="ingresos.html" class="nav-link">
                        <i class="fas fa-arrow-up"></i>
                        Ingresos
                    </a>
                </div>
                <div class="nav-item">
                    <a href="pagos.html" class="nav-link">
                        <i class="fas fa-arrow-down"></i>
                        Pagos
                    </a>
                </div>
                <div class="nav-item">
                    <a href="reportes.html" class="nav-link">
                        <i class="fas fa-file-alt"></i>
                        Reportes
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Cerrar Sesión
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="page-title">Gestión de Modelos</h1>
                <div class="header-actions">
                    <select id="filterEstado" class="form-control">
                        <option value="">Todos los estados</option>
                        <option value="activo">Activos</option>
                        <option value="inactivo">Inactivos</option>
                    </select>
                    <input type="date" id="filterFechaInicio" class="form-control" placeholder="Fecha inicio">
                    <input type="date" id="filterFechaFin" class="form-control" placeholder="Fecha fin">
                    <button class="btn btn-info btn-sm" onclick="filtrarModelos()">
                        <i class="fas fa-filter"></i>
                        Filtrar
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="exportarModelos()">
                        <i class="fas fa-download"></i>
                        Exportar
                    </button>
                    <button class="btn btn-primary" onclick="openModelModal()" data-permission="modelos">
                        <i class="fas fa-plus"></i>
                        Nuevo Modelo
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Formulario de Modelo -->
                <div id="modelForm" class="form-section hidden">
                    <h3 id="formTitle">Nuevo Modelo</h3>
                    <form id="modelFormElement">
                        <input type="hidden" id="modelId">
                        <div class="form-row">
                            <div class="field-group">
                                <label for="nickname">Nickname <span style="color: var(--danger);">*</span></label>
                                <input type="text" id="nickname" name="nickname" placeholder="Ej: Luna_Star" required>
                            </div>
                            <div class="field-group">
                                <label for="nombre">Nombre <span style="color: var(--danger);">*</span></label>
                                <input type="text" id="nombre" name="nombre" placeholder="Nombre real" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="field-group">
                                <label for="apellido">Apellido</label>
                                <input type="text" id="apellido" name="apellido" placeholder="Apellido">
                            </div>
                            <div class="field-group">
                                <label for="porcentaje">% de Ganancia <span style="color: var(--danger);">*</span></label>
                                <input type="number" id="porcentaje" name="porcentaje" min="0" max="100" step="0.01" placeholder="60.00" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="field-group">
                                <label for="cedula">Cédula</label>
                                <input type="text" id="cedula" name="cedula" placeholder="Número de identificación">
                            </div>
                            <div class="field-group">
                                <label for="direccion">Dirección</label>
                                <input type="text" id="direccion" name="direccion" placeholder="Dirección completa">
                            </div>
                        </div>
                        
                        <div class="form-row" style="margin-top: 2rem;">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                Guardar Modelo
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="cancelModelForm()">
                                <i class="fas fa-times"></i>
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Lista de Modelos -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">Lista de Modelos</h3>
                        <div class="header-actions">
                            <input type="text" id="searchInput" placeholder="Buscar modelo..." class="btn btn-secondary" style="max-width: 250px;">
                            <button class="btn btn-secondary btn-sm">
                                <i class="fas fa-filter"></i>
                                Filtrar
                            </button>
                        </div>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nickname</th>
                                <th>Nombre Completo</th>
                                <th>% Ganancia</th>
                                <th>Cédula</th>
                                <th>Total Ganado</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="modelosTable">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <!-- <script src="js/modelos.js"></script> -->
</body>
</html>
